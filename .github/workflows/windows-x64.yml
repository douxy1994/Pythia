name: Windows x64

on:
  push:
    paths:
      - "Windows/Pythia.Windows/**"
      - "Pythia/Resources/pythia-plugin-runner.cjs"
      - "Plugins/**"
      - "script/*plugin*.mjs"
      - ".github/workflows/windows-x64.yml"
  pull_request:
    paths:
      - "Windows/Pythia.Windows/**"
      - "Pythia/Resources/pythia-plugin-runner.cjs"
      - "Plugins/**"
      - "script/*plugin*.mjs"
      - ".github/workflows/windows-x64.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025
    defaults:
      run:
        working-directory: Windows/Pythia.Windows
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.5"
          channel: stable
          cache: true
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
      - name: Resolve dependencies
        run: flutter pub get
      - name: Validate Pythia plugin contract and examples
        run: node ..\..\script\validate_pythia_plugins.mjs
      - name: Validate public plugin packages
        run: node ..\..\script\validate_public_plugins.mjs
      - name: Test public plugin long-text handling
        run: node ..\..\script\test_public_plugin_long_text.mjs
      - name: Test plugin runner network fallback
        run: node ..\..\script\test_plugin_runner_network.mjs
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
      - name: Prepare verified plugin runtime
        shell: pwsh
        run: .\tool\prepare_plugin_runtime.ps1
      - name: Build x64 release
        run: flutter build windows --release
      - name: Verify release package
        run: dart run tool/verify_release_package.dart build\windows\x64\runner\Release
      - name: Build x64 installer and SHA-256
        shell: pwsh
        run: .\tool\build_windows_installer.ps1
      - name: Verify installer checksum
        shell: pwsh
        run: |
          $installer = "dist\Pythia-1.0.0-windows-x64.exe"
          $sidecar = "$installer.sha256"
          if (-not (Test-Path $installer)) { throw "Missing installer: $installer" }
          if (-not (Test-Path $sidecar)) { throw "Missing checksum: $sidecar" }
          $expected = ((Get-Content $sidecar -Raw).Trim() -split '\s+')[0].ToLowerInvariant()
          $actual = (Get-FileHash -Algorithm SHA256 $installer).Hash.ToLowerInvariant()
          if ($expected -ne $actual) {
            throw "Installer checksum mismatch: expected $expected, got $actual"
          }
      - name: Smoke-test runtime and installer
        shell: pwsh
        run: >-
          .\tool\smoke_windows_release.ps1
          -ReleaseDirectory build\windows\x64\runner\Release
          -InstallerPath dist\Pythia-1.0.0-windows-x64.exe
      - name: Upload runtime smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: Pythia-windows-runtime-smoke-logs
          path: ${{ runner.temp }}/pythia-runtime-smoke/*.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload verified candidate
        uses: actions/upload-artifact@v7
        with:
          name: Pythia-1.0.0-windows-x64
          path: |
            Windows/Pythia.Windows/dist/Pythia-1.0.0-windows-x64.exe
            Windows/Pythia.Windows/dist/Pythia-1.0.0-windows-x64.exe.sha256
          if-no-files-found: error
          retention-days: 14
